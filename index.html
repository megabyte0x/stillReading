<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>stillReading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #09090b;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px;
      animation: fadeIn 0.4s ease;
    }

    ::selection { background: #dc2626; color: #fff; }
    button:focus-visible { outline: 1px solid #dc2626; outline-offset: 2px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes wpmPop {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      30%  { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
    }

    /* ── Header ─────────────────────────────────────────────────── */
    #header {
      width: 100%;
      max-width: 640px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 0 20px;
      border-bottom: 1px solid #1a1a1f;
      margin-bottom: 40px;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon { color: #dc2626; font-size: 1.1rem; }
    .logo-text {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }
    .logo-sub {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: 1rem;
      color: #52525b;
    }
    .nav-tabs {
      display: flex;
      gap: 4px;
      background: #18181b;
      border-radius: 8px;
      padding: 3px;
    }
    .tab {
      font-family: 'Outfit', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #71717a;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .tab.active { background: #27272a; color: #fafafa; }

    /* ── View switching ──────────────────────────────────────────── */
    [data-view="editor"] #reader-view { display: none; }
    [data-view="reader"] #editor-view { display: none; }

    /* ── Reader view ─────────────────────────────────────────────── */
    #reader-view {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    .redicle-container {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 0 50px;
    }
    .redicle {
      position: relative;
      width: 100%;
      max-width: 560px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 2px solid #1c1c22;
      border-bottom: 2px solid #1c1c22;
    }
    .guide-top {
      position: absolute;
      left: 50%; top: -10px;
      width: 1px; height: 10px;
      background: #dc2626; opacity: 0.6;
    }
    .guide-bottom {
      position: absolute;
      left: 50%; bottom: -10px;
      width: 1px; height: 10px;
      background: #dc2626; opacity: 0.6;
    }
    .word-wrapper { position: relative; display: flex; justify-content: center; }
    .word-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 3.5rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      white-space: nowrap;
      color: #e4e4e7;
    }
    #w-pivot { color: #dc2626; font-weight: 700; }

    /* ── Progress bar ────────────────────────────────────────────── */
    .progress-container {
      width: 100%;
      height: 1px;
      background: #1e1e22;
      border-radius: 1px;
      cursor: pointer;
      margin-bottom: 32px;
    }
    .progress-fill {
      height: 100%;
      background: #3f3f46;
      border-radius: 1px;
      width: 0%;
      transition: width 0.08s linear;
    }

    /* ── Controls ────────────────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .play-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 2px solid #dc2626;
      background: transparent;
      color: #dc2626;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease;
      font-family: inherit;
    }
    .play-btn:hover { background: rgba(220, 38, 38, 0.08); }
    .ctrl-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid #27272a;
      background: transparent;
      color: #71717a;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease;
      font-family: inherit;
    }
    .ctrl-btn:hover { border-color: #52525b; color: #a1a1aa; }
    .wpm-display {
      display: flex; flex-direction: column; align-items: center; min-width: 50px;
    }
    #wpm-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem; font-weight: 600; color: #fafafa;
    }
    .wpm-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem; color: #52525b;
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    /* ── Stats ───────────────────────────────────────────────────── */
    .stats { display: flex; gap: 8px; align-items: center; }
    #stat-pos, #stat-eta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; color: #52525b;
    }
    .stat-divider { color: #27272a; font-size: 0.75rem; }

    /* ── WPM popup ───────────────────────────────────────────────── */
    .wpm-popup {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.4rem; font-weight: 600; color: #dc2626;
      background: rgba(9, 9, 11, 0.9);
      padding: 12px 28px; border-radius: 12px;
      border: 1px solid #27272a;
      pointer-events: none; z-index: 100;
      animation: wpmPop 0.82s ease forwards;
    }
    .hidden { display: none !important; }

    /* ── Editor view ─────────────────────────────────────────────── */
    #editor-view {
      width: 100%; max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 16px; flex: 1;
      animation: fadeIn 0.3s ease;
    }
    .editor-header { display: flex; justify-content: space-between; align-items: center; }
    .editor-label { font-size: 0.9rem; color: #a1a1aa; }
    #editor-word-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; color: #52525b;
    }
    .md-textarea {
      width: 100%; min-height: 400px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      color: #d4d4d8;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem; line-height: 1.7;
      padding: 20px; resize: vertical;
    }
    .md-textarea:focus { outline: 1px solid #dc2626; }
    .load-btn {
      align-self: flex-end;
      padding: 10px 28px;
      background: #dc2626;
      border: none; border-radius: 8px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s ease;
    }
    .load-btn:hover { background: #b91c1c; }

    /* ══════════════════════════════════════════════════════════════
       RESPONSIVE
       ══════════════════════════════════════════════════════════════ */

    /* Fluid word size — scales from ~29px on tiny screens to 56px on desktop */
    .word-text { font-size: clamp(1.8rem, 9vw, 3.5rem); }

    /* Fluid redicle height */
    .redicle { height: clamp(80px, 20vw, 120px); }

    /* Fluid vertical breathing room */
    .redicle-container { padding: clamp(24px, 7vh, 60px) 0 clamp(20px, 5vh, 50px); }

    /* ── Small phones ≤ 480px ──────────────────────────────────── */
    @media (max-width: 480px) {
      body { padding: 0 16px; }

      #header {
        padding: 16px 0 14px;
        margin-bottom: 20px;
      }
      .logo-text, .logo-sub { font-size: 0.88rem; }
      .tab { padding: 5px 14px; font-size: 0.78rem; }

      /* Fatter touch target but still subtle */
      .progress-container {
        height: 2px;
        border-radius: 1px;
        margin-bottom: 24px;
        padding-block: 8px;
        box-sizing: content-box;
      }
      .progress-fill { border-radius: 1px; }

      /* Larger touch targets (Apple HIG: 44px min) */
      .ctrl-btn  { width: 44px; height: 44px; }
      .play-btn  { width: 60px; height: 60px; }
      .controls  { gap: 12px; margin-bottom: 20px; }

      /* Editor */
      .md-textarea { min-height: 220px; padding: 14px; font-size: 0.8rem; }
      .load-btn    { align-self: stretch; text-align: center; padding: 14px; }
      #editor-view { padding-bottom: env(safe-area-inset-bottom, 16px); }
    }

    /* ── Very small phones ≤ 360px ─────────────────────────────── */
    @media (max-width: 360px) {
      .word-text { font-size: clamp(1.5rem, 10vw, 3.5rem); }
      .controls  { gap: 8px; }
      .tab { padding: 5px 10px; }
    }

    /* ── Landscape phones (short viewport) ─────────────────────── */
    @media (max-height: 500px) and (orientation: landscape) {
      #header            { padding: 10px 0 8px; margin-bottom: 10px; }
      .redicle-container { padding: 12px 0 10px; }
      .redicle           { height: 70px; }
      .word-text         { font-size: clamp(1.4rem, 5vw, 2.2rem); }
      .progress-container { margin-bottom: 14px; }
      .controls          { margin-bottom: 10px; gap: 10px; }
      .play-btn          { width: 48px; height: 48px; }
      .ctrl-btn          { width: 38px; height: 38px; }
      .stats             { display: none; } /* reclaim vertical space */
    }

    /* ── Tablets & up ≥ 768px ──────────────────────────────────── */
    @media (min-width: 768px) {
      /* Bump textarea height when there's room */
      .md-textarea { min-height: 480px; }
    }

    /* ── Safe area insets (notched phones) ─────────────────────── */
    @supports (padding: env(safe-area-inset-bottom)) {
      body { padding-bottom: env(safe-area-inset-bottom); }
    }
  </style>
</head>
<body data-view="reader">

  <!-- Header -->
  <header id="header">
    <div class="logo">
      <span class="logo-icon">◉</span>
      <span class="logo-text">still</span><span class="logo-sub">Reading</span>
    </div>
    <nav class="nav-tabs">
      <button class="tab active" data-tab="reader" onclick="switchView('reader')">Read</button>
      <button class="tab"        data-tab="editor" onclick="switchView('editor')">Edit</button>
    </nav>
  </header>

  <!-- Reader view -->
  <main id="reader-view">
    <div class="redicle-container">
      <div class="redicle">
        <div class="guide-top"></div>
        <div class="guide-bottom"></div>
        <div class="word-wrapper">
          <span class="word-text">
            <span id="w-before"></span><span id="w-pivot"></span><span id="w-after"></span>
          </span>
        </div>
      </div>
    </div>

    <div id="progress-bar" class="progress-container">
      <div id="progress-fill" class="progress-fill"></div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" onclick="adjustWpm(-50)" title="Slower (←)">−</button>
      <button class="ctrl-btn" onclick="restart()"      title="Restart (R)">⟲</button>
      <button class="play-btn" id="play-btn"            onclick="togglePlay()">▶</button>
      <div class="wpm-display">
        <span id="wpm-number">300</span>
        <span class="wpm-label">wpm</span>
      </div>
      <button class="ctrl-btn" onclick="adjustWpm(50)"  title="Faster (→)">+</button>
    </div>

    <div class="stats">
      <span id="stat-pos">0 / 0</span>
      <span class="stat-divider">·</span>
      <span id="stat-eta">0s remaining</span>
    </div>
  </main>

  <!-- Editor view -->
  <section id="editor-view">
    <div class="editor-header">
      <p class="editor-label">Paste your Markdown below</p>
      <span id="editor-word-count">0 words</span>
    </div>
    <textarea
      id="markdown-input"
      class="md-textarea"
      spellcheck="false"
      placeholder="# Paste your markdown here..."
    ></textarea>
    <button class="load-btn" onclick="loadAndRead()">Start Reading →</button>
  </section>

  <!-- WPM popup (shared, outside views) -->
  <div id="wpm-popup" class="wpm-popup hidden"></div>

  <script>
// =============================================================================
// DOM REFS
// =============================================================================

const elBefore      = document.getElementById('w-before');
const elPivot       = document.getElementById('w-pivot');
const elAfter       = document.getElementById('w-after');
const elProgressBar = document.getElementById('progress-bar');
const elProgressFill= document.getElementById('progress-fill');
const elPlayBtn     = document.getElementById('play-btn');
const elWpmNumber   = document.getElementById('wpm-number');
const elStatPos     = document.getElementById('stat-pos');
const elStatEta     = document.getElementById('stat-eta');
const elWpmPopup    = document.getElementById('wpm-popup');
const elTextarea    = document.getElementById('markdown-input');
const elEditorCount = document.getElementById('editor-word-count');

// =============================================================================
// STATE
// =============================================================================

let words   = [];
let idx     = 0;
let wpm     = 300;
let playing = false;
let timer   = null;

// =============================================================================
// ORP (Optimal Recognition Point)
// =============================================================================

function getORP(word) {
  const len = word.length;
  if (len === 1)  return 0;
  if (len <= 5)   return 1;
  if (len <= 9)   return 2;
  if (len <= 13)  return 3;
  return 4;
}

// =============================================================================
// ADAPTIVE TIMING
// =============================================================================

function getWordDelay(word, baseDelay) {
  let multiplier = 1;
  if (word.length > 8)  multiplier += 0.3;
  if (word.length > 12) multiplier += 0.2;
  if (/[.!?]$/.test(word))          multiplier += 1.2;
  else if (/[,;:]$/.test(word))     multiplier += 0.5;
  else if (/[-\u2013\u2014]$/.test(word)) multiplier += 0.3;
  return baseDelay * multiplier;
}

// =============================================================================
// PARSER
// =============================================================================

function parseMarkdown(md) {
  return md
    .replace(/^#{1,6}\s+/gm, '')
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/__(.+?)__/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/_(.+?)_/g, '$1')
    .replace(/~~(.+?)~~/g, '$1')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/^[-*+]\s+/gm, '')
    .replace(/^\d+\.\s+/gm, '')
    .replace(/^>\s+/gm, '')
    .split(/\s+/)
    .filter(w => w.length > 0);
}

// =============================================================================
// SAMPLE CONTENT
// =============================================================================

const SAMPLE = `# The Art of Speed Reading

Speed reading is a collection of techniques used to increase one's rate of reading without greatly reducing comprehension or retention. These methods typically involve visual guides, chunking text, and minimizing subvocalization.

## How RSVP Works

Rapid Serial Visual Presentation displays words one at a time at a fixed focal point. The Optimal Recognition Point — the letter your brain naturally focuses on first — is highlighted and centered, eliminating eye movement entirely.

## Benefits

This technique allows readers to consume text significantly faster than traditional reading. By removing saccades, the brain can focus purely on word recognition and meaning construction.

## Tips for Best Results

Start at a comfortable speed around 250 words per minute. Gradually increase as you become familiar with the format. Take breaks every few minutes to avoid visual fatigue. Remember that comprehension matters more than raw speed.

The goal is not to race through text, but to find your optimal pace where speed and understanding coexist harmoniously.`;

// =============================================================================
// RENDER
// =============================================================================

function renderWord(word) {
  const orp = getORP(word);
  elBefore.textContent  = word.slice(0, orp);
  elPivot.textContent   = word[orp] || '';
  elAfter.textContent   = word.slice(orp + 1);
  elPivot.style.opacity = '1';
}

function renderIdle() {
  elBefore.textContent  = '';
  elPivot.textContent   = '▶';
  elAfter.textContent   = '';
  elPivot.style.opacity = '0.2';
}

function updateStats() {
  const total   = words.length;
  const current = Math.min(idx + 1, total);
  elStatPos.textContent = total > 0 ? `${current} / ${total}` : '0 / 0';

  const wordsLeft   = Math.max(total - idx, 0);
  const secondsLeft = Math.round((wordsLeft / wpm) * 60);
  const minutes     = Math.floor(secondsLeft / 60);
  const seconds     = secondsLeft % 60;
  elStatEta.textContent = minutes > 0
    ? `${minutes}m ${seconds}s remaining`
    : `${secondsLeft}s remaining`;

  elProgressFill.style.width = total > 0 ? `${(idx / total) * 100}%` : '0%';
}

// =============================================================================
// PLAYBACK
// =============================================================================

function tick() {
  if (idx >= words.length) { stop(); return; }
  renderWord(words[idx]);
  updateStats();
  const delay = getWordDelay(words[idx], 60000 / wpm);
  idx++;
  timer = setTimeout(tick, delay);
}

function stop() {
  clearTimeout(timer);
  timer   = null;
  playing = false;
  elPlayBtn.textContent = '▶';
}

function togglePlay() {
  if (words.length === 0) return;
  if (idx >= words.length) idx = 0;
  playing = !playing;
  if (playing) {
    elPlayBtn.textContent = '❚❚';
    tick();
  } else {
    elPlayBtn.textContent = '▶';
    clearTimeout(timer);
  }
}

function restart() {
  stop();
  idx = 0;
  elProgressFill.style.width = '0%';
  renderIdle();
  updateStats();
}

function adjustWpm(delta) {
  wpm = Math.min(1000, Math.max(50, wpm + delta));
  elWpmNumber.textContent = wpm;
  showWpmPopup();
}

function showWpmPopup() {
  elWpmPopup.textContent = `${wpm} wpm`;
  elWpmPopup.classList.remove('hidden');
  void elWpmPopup.offsetWidth; // re-trigger animation
  elWpmPopup.style.animation = 'none';
  void elWpmPopup.offsetWidth;
  elWpmPopup.style.animation = '';
  setTimeout(() => elWpmPopup.classList.add('hidden'), 820);
}

// =============================================================================
// MARKDOWN LOADING
// =============================================================================

function loadMarkdown(md) {
  words = parseMarkdown(md);
  idx   = 0;
  stop();
  renderIdle();
  updateStats();
  elEditorCount.textContent = `${words.length} words`;
}

function loadAndRead() {
  loadMarkdown(elTextarea.value);
  switchView('reader');
}

// =============================================================================
// VIEW SWITCHING
// =============================================================================

function switchView(view) {
  document.body.dataset.view = view;
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.tab === view);
  });
  if (view === 'editor') stop();
}

// =============================================================================
// EVENTS
// =============================================================================

// Progress bar seek
elProgressBar.addEventListener('click', function(e) {
  if (words.length === 0) return;
  const rect       = elProgressBar.getBoundingClientRect();
  const pct        = (e.clientX - rect.left) / rect.width;
  const wasPlaying = playing;
  stop();
  idx = Math.max(0, Math.min(Math.floor(pct * words.length), words.length - 1));
  renderWord(words[idx]);
  updateStats();
  if (wasPlaying) {
    playing = true;
    elPlayBtn.textContent = '❚❚';
    tick();
  }
});

// Editor live word count
elTextarea.addEventListener('input', function() {
  elEditorCount.textContent = `${parseMarkdown(elTextarea.value).length} words`;
});

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.target === elTextarea) return;
  if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
  else if (e.code === 'ArrowLeft')  adjustWpm(-50);
  else if (e.code === 'ArrowRight') adjustWpm(50);
  else if (e.code === 'KeyR')       restart();
});

// =============================================================================
// INIT
// =============================================================================

elTextarea.value = SAMPLE;
loadMarkdown(SAMPLE);
renderIdle();
  </script>
</body>
</html>
